services:
  postgres:
    image: postgres:16-alpine
    container_name: eam-postgres
    environment:
      POSTGRES_USER: eam
      POSTGRES_PASSWORD: eam_secret
      POSTGRES_DB: eam_db
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eam-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
